<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maki – Registro de Cliente</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script>
    const files = [
      "/_css/global.css",
    ];

    (async () => {
      for (const file of files) {
        const req = await fetch(file)
        const content = await req.text()
        const style = document.createElement('style');
        style.setAttribute('type', 'text/tailwindcss');
        style.textContent = content
        document.head.appendChild(style);
      }
    })()
  </script>

  <link rel="stylesheet" th:href="@{/_css/log-in-style.css}">
</head>

<body>

  <div class="bg-slideshow">
    <div class="bg-slide activo"></div>
    <div class="bg-slide"></div>
    <div class="bg-slide"></div>
  </div>

  <div class="card-login" style="max-width: 500px;">
    <div class="d-flex align-items-center gap-3 mb-4">
      <img th:src="@{/_brand/logo.svg}" class="brand-logo" alt="Logo Maki">
      <div>
        <div class="brand-name">MAKI</div>
        <div class="brand-sub">crear cuenta</div>
      </div>
    </div>

    <form th:action="@{/client/sign-up}" th:object="${cliente}" method="post">

      <div class="row">
        <div class="col-md-6 mb-3">
          <input type="text" class="form-control form-control-maki" placeholder="Nombre" th:field="*{nombre}"
            required />
        </div>
        <div class="col-md-6 mb-3">
          <input type="text" class="form-control form-control-maki" placeholder="Apellido" th:field="*{Apellido}"
            required />
        </div>
      </div>

      <div class="mb-3">
        <input type="email" class="form-control form-control-maki w-100" placeholder="Correo electrónico"
          th:field="*{correo}" required />
      </div>

      <div class="mb-3">
        <input type="password" class="form-control form-control-maki w-100" placeholder="Contraseña"
          th:field="*{contrasena}" required />
      </div>

      <div class="mb-3">
        <input type="tel" class="form-control form-control-maki w-100" placeholder="Teléfono" th:field="*{telefono}" />
      </div>

      <div class="mb-4">
        <input type="text" class="form-control form-control-maki w-100" placeholder="Dirección de entrega"
          th:field="*{Direccion}" />
      </div>
      
      <div id="log-in-errors">
      
      </div>

      <div class="d-grid mb-4">
        <button type="submit" class="btn btn-maki">Registrarme</button>
      </div>

      <div class="text-center">
        <a href="/client/log-in" class="link-maki">¿Ya tienes cuenta? Inicia sesión aquí</a>
      </div>

    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/_js/log-in.js}"></script>

</body>

</html>
