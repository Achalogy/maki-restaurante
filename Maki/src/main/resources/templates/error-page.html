<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | Maki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:       #1a1008;
            --paper:     #f5f0e8;
            --red:       #c0392b;
            --red-soft:  #e8d5d3;
            --gold:      #b8963e;
            --mist:      #e8e4dc;
            --shadow:    rgba(26,16,8,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── fondo con textura de papel ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(184,150,62,.06) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(192,57,43,.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── líneas verticales decorativas (estilo shoji) ── */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            width: 1px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            opacity: .18;
            pointer-events: none;
        }

        /* ─────────────── HEADER ─────────────── */
        header {
            position: relative;
            z-index: 10;
            padding: 1.4rem 2.5rem;
            display: flex;
            align-items: center;
            gap: .6rem;
            border-bottom: 1px solid rgba(184,150,62,.25);
        }

        .logo-text {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: .08em;
            color: var(--ink);
        }

        .logo-dot {
            width: 8px; height: 8px;
            background: var(--red);
            border-radius: 50%;
            margin-bottom: 2px;
        }

        /* ─────────────── MAIN ─────────────── */
        main {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1.5rem;
        }

        .error-card {
            background: #fff;
            border: 1px solid var(--mist);
            border-top: 4px solid var(--red);
            border-radius: 2px;
            box-shadow: 0 8px 40px var(--shadow), 0 2px 8px var(--shadow);
            padding: 3.5rem 3rem 3rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
            animation: rise .55s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0);    }
        }

        /* ── sello rojo de error (estilo hanko) ── */
        .error-stamp {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 90px; height: 90px;
            border: 3px solid var(--red);
            border-radius: 4px;
            margin-bottom: 1.8rem;
            rotate: -6deg;
            animation: stamp .4s .3s cubic-bezier(.34,1.56,.64,1) both;
        }

        @keyframes stamp {
            from { opacity: 0; scale: .4; }
            to   { opacity: 1; scale: 1;  }
        }

        .error-stamp::before {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid var(--red);
            border-radius: 2px;
            opacity: .4;
        }

        .stamp-icon { font-size: 2.6rem; line-height: 1; }

        .stamp-code {
            position: absolute;
            bottom: -12px; right: -12px;
            background: var(--red);
            color: #fff;
            font-family: 'Noto Serif JP', serif;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .05em;
            padding: 2px 7px;
            border-radius: 2px;
        }

        /* ── contenido ── */
        .error-title {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: .75rem;
            line-height: 1.25;
        }

        .error-divider {
            width: 48px; height: 2px;
            background: linear-gradient(90deg, var(--red), var(--gold));
            margin: 0 auto 1.1rem;
            border-radius: 2px;
        }

        .error-message {
            font-size: .975rem;
            color: #5a4a3a;
            line-height: 1.7;
            margin-bottom: 2.2rem;
        }

        /* ── botones ── */
        .btn-group {
            display: flex;
            gap: .9rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .65rem 1.5rem;
            border-radius: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: .875rem;
            font-weight: 500;
            letter-spacing: .03em;
            text-decoration: none;
            cursor: pointer;
            transition: transform .18s, box-shadow .18s, background .18s;
            border: none;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: var(--red);
            color: #fff;
            box-shadow: 0 3px 14px rgba(192,57,43,.35);
        }
        .btn-primary:hover { box-shadow: 0 6px 20px rgba(192,57,43,.45); }

        .btn-secondary {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid var(--mist);
        }
        .btn-secondary:hover { background: var(--mist); }

        /* ── nota extra ── */
        .error-note {
            margin-top: 2rem;
            font-size: .78rem;
            color: #9a8878;
            font-style: italic;
        }

        /* ─────────────── FOOTER ─────────────── */
        footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1.2rem;
            font-size: .75rem;
            color: #9a8878;
            border-top: 1px solid var(--mist);
        }

        /* ─────────────── RESPONSIVE ─────────────── */
        @media (max-width: 480px) {
            .error-card { padding: 2.5rem 1.5rem 2rem; }
            .error-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-dot"></div>
        <span class="logo-text">maki</span>
    </header>

    <main>
        <div class="error-card">

            <!-- Sello estilo hanko -->
            <div class="error-stamp">
                <span class="stamp-icon" th:text="${errorIcon != null ? errorIcon : '⚠️'}">⚠️</span>
                <span class="stamp-code" th:text="${errorCode != null ? errorCode : '???'}">500</span>
            </div>

            <h1 class="error-title" th:text="${errorTitle != null ? errorTitle : 'Algo salió mal'}">
                Algo salió mal
            </h1>

            <div class="error-divider"></div>

            <p class="error-message" th:text="${errorMessage != null ? errorMessage : 'Ocurrió un error inesperado. Por favor, intenta de nuevo más tarde.'}">
                Ocurrió un error inesperado. Por favor, intenta de nuevo más tarde.
            </p>

            <div class="btn-group">
                <a href="/" class="btn btn-primary">
                      Ir al inicio
                </a>
                <a href="javascript:history.back()" class="btn btn-secondary">
                    ← Volver atrás
                </a>
            </div>

            <p class="error-note">
                Si el problema persiste, contacta al administrador del sitio.
            </p>

        </div>
    </main>

    <footer>
        &copy; 2025 Maki &mdash; Comida japonesa
    </footer>

</body>
</html>
