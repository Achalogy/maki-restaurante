<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maki Admin - Gestión de Clientes</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script>
    const files = [
      "/_css/global.css",
      "/_css/fragments/landing/header_menu.css",
      "/_css/fragments/footer.css",
    ];

    (async () => {
      for (const file of files) {
        const req = await fetch(file);
        const content = await req.text();
        const style = document.createElement("style");
        style.setAttribute("type", "text/tailwindcss");
        style.textContent = content;
        document.head.appendChild(style);
      }
    })();
  </script>
  <th:block th:replace="fragments/fonts :: fonts"> </th:block>
</head>

<body class="font-sans">
  <header th:replace="fragments/landing/header_menu :: header-menu"></header>

  <main class="tree_background">
    <br />
    <h2 class="text-center text-2xl font-bold uppercase tracking-widest text-gray-800">Panel de Clientes</h2>

    <section class="max-w-full mx-auto px-6 py-10">
      <div class="flex gap-4 mb-8">
        <form th:action="@{/client/sign-up}" method="get">
          <button type="submit"
            class="bg-[#eb7c21] hover:bg-[#d15d19] text-white font-bold py-3 px-8 rounded-lg transition duration-200 text-lg shadow-lg">
            + Registrar Nuevo Cliente
          </button>
        </form>
      </div>

      <div class="overflow-x-auto rounded-xl shadow-2xl">
        <table class="w-full border-collapse bg-white">
          <thead class="bg-[#eb7c21] text-white text-center">
            <tr>
              <th class="px-6 py-4 font-bold text-lg">ID</th>
              <th class="px-6 py-4 font-bold text-lg text-left">Nombre Completo</th>
              <th class="px-6 py-4 font-bold text-lg text-left">Contacto</th>
              <th class="px-6 py-4 font-bold text-lg text-left">Dirección</th>
              <th class="px-6 py-4 font-bold text-lg">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${clientes}" class="border-b border-gray-200 hover:bg-orange-50 transition duration-150">
              <td class="px-6 py-4 text-center font-mono text-gray-500" th:text="${c.id}">
                1
              </td>

              <td class="px-6 py-4">
                <div class="flex flex-col">
                  <span th:text="${c.nombre} + ' ' + ${c.Apellido}"
                    class="text-xl font-bold text-black uppercase">Nombre Apellido</span>
                  <span th:text="${c.correo}" class="text-sm text-gray-500 italic">correo@maki.com</span>
                </div>
              </td>

              <td class="px-6 py-4">
                <p th:text="${c.telefono}" class="text-gray-700 font-medium">
                  +56 9 1234 5678
                </p>
              </td>

              <td class="px-6 py-4">
                <p th:text="${c.Direccion}" class="text-gray-600 text-sm truncate max-w-xs">
                  Calle Falsa 123, Ciudad
                </p>
              </td>

              <td class="px-6 py-4 text-center">
                <div class="flex flex-col gap-2 items-center">

                  <a th:href="@{/client/edit/{id}(id=${c.id})}"
                    class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 text-sm w-32 text-center">
                    ✏ Edit
                  </a>

                  <form th:action="@{/client/delete/{id}(id=${c.id})}" method="post"
                    onsubmit="return confirm('¿Estás seguro de eliminar a este cliente? Esta acción no se puede deshacer.');">
                    <button type="submit"
                      class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 text-sm w-32">
                      🗑 Delete
                    </button>
                  </form>

                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer th:replace="fragments/footer.html :: footer"></footer>
</body>

</html>
